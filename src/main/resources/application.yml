server:
  port: 8089

spring:
  application:
    name: ms-horarios

  datasource:
    url: jdbc:mysql://localhost:3306/db_horarios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

